services:
  mongodb:
    image: mongo:latest
    container_name: hypesoft_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: hypesoft_auth
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_DB: "dev-file"
      JAVA_OPTS_APPEND: "-Xms256m -Xmx768m"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypesoft_api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017/HypesoftDb
    depends_on:
      - mongodb
      - keycloak

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hypesoft_web
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  keycloak_data: